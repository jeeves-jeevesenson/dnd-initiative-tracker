text:
  summary: Spectral vines lash out from you and restrain nearby enemies.
  rules: As a Magic action, you can expend one use of Channel Divinity to conjure spectral vines around nearby creatures. Each enemy you can see within 15 feet must succeed on a Strength saving throw or be Restrained for 1 minute. A Restrained creature repeats the save at the end of each of its turns, ending the effect on a success.
